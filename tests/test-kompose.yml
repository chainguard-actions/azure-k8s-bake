name: Test kompose render engine
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: bake
        uses: .
        with:
          renderEngine: kompose
          dockerComposeFile: ${{ github.workspace }}/actions/hardened/azure--k8s-bake/v3.0.4/tests/fixtures/kompose/docker-compose.yaml
          kompose-version: v1.26.0
      - name: Assert manifestsBundle output is set
        env:
          ACTUAL: ${{ steps.bake.outputs.manifestsBundle }}
        run: |
          echo "actual manifestsBundle: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: manifestsBundle output is empty"
            exit 1
          fi
          echo "PASS: manifestsBundle is set to $ACTUAL"
      - name: Assert manifest bundle file exists
        env:
          BUNDLE: ${{ steps.bake.outputs.manifestsBundle }}
        run: |
          echo "Checking bundle path: $BUNDLE"
          if [ ! -f "$BUNDLE" ]; then
            echo "FAIL: manifest bundle file does not exist at $BUNDLE"
            exit 1
          fi
          echo "PASS: manifest bundle file exists"
      - name: Assert manifest bundle contains expected Kubernetes resources
        env:
          BUNDLE: ${{ steps.bake.outputs.manifestsBundle }}
        run: |
          echo "Bundle contents:"
          cat "$BUNDLE"
          if ! grep -qE "Deployment|Service" "$BUNDLE"; then
            echo "FAIL: manifest bundle does not contain expected Kubernetes resources"
            exit 1
          fi
          echo "PASS: manifest bundle contains expected content"
